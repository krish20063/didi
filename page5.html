<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories Continue 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  /* New Theme: Deep Midnight Gradient */
  background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
  font-family: 'Poppins', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  text-align: center;
}

.container {
  width: 90%;
  max-width: 900px;
  position: relative;
}

/* TEXT STYLE */
.text {
  font-size: 28px;
  margin-bottom: 30px;
  opacity: 0;
  transition: 1.5s ease-in-out;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

/* PHOTOS STYLE */
.photos {
  display: flex;
  gap: 25px;
  justify-content: center;
  opacity: 0;
  transition: 1.5s ease-in-out;
}

.photos img {
  width: 220px;
  height: 280px;
  object-fit: cover;
  border-radius: 20px;
  border: 2px solid rgba(255, 215, 0, 0.3); /* Soft Gold Border */
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

/* FINAL NOTE - Centered and Large */
.final-note {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  font-family: 'Dancing Script', cursive; /* Elegant Cursive */
  font-size: 42px;
  line-height: 1.4;
  color: #ffd700; /* Gold Color */
  opacity: 0;
  visibility: hidden;
  transition: 2s ease-in-out;
  z-index: 10;
  background: rgba(255, 255, 255, 0.05); /* Subtle Glass Effect */
  padding: 40px;
  border-radius: 30px;
  backdrop-filter: blur(5px);
}

/* BUTTON */
button {
  margin-top: 40px;
  padding: 15px 35px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ffd700, #ffae00);
  color: #000;
  font-weight: 600;
  font-size: 18px;
  cursor: pointer;
  opacity: 0;
  transition: 1.5s;
  box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
}
</style>
</head>

<body>

<div class="container">
  <div class="text" id="text"></div>

  <div class="photos" id="photos">
    <img id="img1" src="pet1.jpg">
    <img id="img2" src="pet2.jpg">
  </div>

  <div class="final-note" id="note">
    No matter what happens…<br>
    these moments will always stay my favorite 💙<br>
    and so will you.
  </div>

  <button id="nextBtn" onclick="goNext()">Final Surprise ➡️</button>
</div>

<script>
let text = document.getElementById("text");
let photos = document.getElementById("photos");
let img1 = document.getElementById("img1");
let img2 = document.getElementById("img2");
let note = document.getElementById("note");
let btn = document.getElementById("nextBtn");

function step1() {
  text.innerHTML = "Finally you have two of your favourite pets 🐾";
  text.style.opacity = 1;
  
  setTimeout(() => {
    photos.style.opacity = 1;
  }, 800);

  setTimeout(step2, 4000);
}

function step2() {
  text.style.opacity = 0;
  photos.style.opacity = 0;

  setTimeout(() => {
    text.innerHTML = "IDK about your's but here's my best moment of all time 💙";
    img1.src = "mem1.jpg";
    img2.src = "mem2.jpg";
    text.style.opacity = 1;

    setTimeout(() => {
      photos.style.opacity = 1;
    }, 800);
  }, 1500);

  setTimeout(step3, 6000);
}

function step3() {
  text.style.opacity = 0;
  photos.style.opacity = 0;

  setTimeout(() => {
    // Making it visible and centered
    note.style.visibility = "visible";
    note.style.opacity = 1;
    
    setTimeout(() => {
        btn.style.opacity = 1;
    }, 1500);
  }, 1500);
}

function goNext() {
  window.location.href = "page6.html";
}

// Start sequence
window.onload = step1;

</script>

</body>
</html>
