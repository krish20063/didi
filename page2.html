<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      transform: translateY(-20px);
    }

    h1 {
      font-size: 2.2rem;
    }

    .photo {
      margin: 20px 0;
    }

    .photo img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    /* 🎂 CLEAN CAKE */
    .cake {
      margin-top: 40px;
      position: relative;
      width: 180px;
      margin-left: auto;
      margin-right: auto;
    }

    .cake-base {
      width: 180px;
      height: 90px;
      background: #8b4513;
      border-radius: 10px;
    }

    .icing {
      width: 180px;
      height: 30px;
      background: #fff;
      border-radius: 10px 10px 0 0;
      position: absolute;
      top: -15px;
    }

    .candle {
      width: 8px;
      height: 35px;
      background: #fff;
      position: absolute;
      top: -60px;
    }

    .candle1 { left: 50px; }
    .candle2 { left: 110px; }

    .flame {
      width: 8px;
      height: 12px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -12px;
      animation: flicker 0.3s infinite alternate;
    }

    @keyframes flicker {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    .message {
      margin-top: 15px;
      height: 25px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4b7d;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    /* ✨ SUBTLE SPARKLES */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: sparkleAnim linear infinite;
    }

    @keyframes sparkleAnim {
      from {
        transform: translateY(100vh);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Happy Birthday 🎉</h1>

    <div class="photo">
      <img src="didi.jpg" alt="Asmita">
    </div>

    <div class="cake">
      <div class="icing"></div>
      <div class="cake-base"></div>

      <div class="candle candle1">
        <div class="flame" id="flame1"></div>
      </div>

      <div class="candle candle2">
        <div class="flame" id="flame2"></div>
      </div>
    </div>

    <div class="message" id="msg"></div>

    <button id="btn" onclick="handleClick()">Blow Candles 🕯️</button>

  </div>

  <script>
    let step = 0;

    function handleClick() {
      let msg = document.getElementById("msg");
      let btn = document.getElementById("btn");

      if (step === 0) {
        msg.innerText = "Height too short, try again 😜";
        btn.innerText = "Blow Again 🤞";
        step++;
      }
      else if (step === 1) {
        document.getElementById("flame1").style.display = "none";
        document.getElementById("flame2").style.display = "none";

        msg.innerText = "Yayyyy🎉 Finally Bauni did it!";
        btn.innerText = "Next Surprise ➡️";
        step++;
      }
      else {
        window.location.href = "page3.html";
      }
    }

    // subtle sparkles
    for (let i = 0; i < 20; i++) {
      let s = document.createElement("div");
      s.className = "sparkle";
      s.style.left = Math.random() * 100 + "vw";
      s.style.animationDuration = (4 + Math.random() * 3) + "s";
      document.body.appendChild(s);
    }
  </script>

</body>
</html>
